rtmp_listen: ":1935"
http_listen: ":8080"
rtsp_ingest_api: false
rtsp_transport: "tcp"
rtsp_stimeout_usec: 5000000
max_streams: 100
idle_timeout_sec: 30
storage_mode: "memory"
storage_path: "/dev/shm/hls"
master_name: "master.m3u8"
segment_time: 2
segment_count: 20
ffmpeg_bin: "ffmpeg"
video_codec: "libx264"
video_preset: "veryfast"
video_tune: "zerolatency"
video_fps: 25
audio_codec: "aac"
audio_bitrate: "128k"
audio_sample_rate: 48000
variants:
  - name: "360p"
    width: 640
    height: 360
    video_bitrate: "800k"
    maxrate: "856k"
    bufsize: "1200k"
    audio_bitrate: "96k"
  - name: "720p"
    width: 1280
    height: 720
    video_bitrate: "2800k"
    maxrate: "2996k"
    bufsize: "4200k"
    audio_bitrate: "128k"
