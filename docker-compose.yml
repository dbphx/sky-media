version: "3.9"

services:
  media-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sky-media-engine
    ports:
      - "1935:1935"
      - "8080:8080"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./data:/data
    tmpfs:
      - /dev/shm/hls:size=512m
    restart: unless-stopped
